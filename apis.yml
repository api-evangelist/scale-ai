apis:
- aid: scale-ai:scale-rest-api
  name: Scale REST API
  description: The Scale REST API is the unified programmatic surface for Scale's
    data engine. It is built on REST principles with resource-oriented URLs, form-encoded
    request bodies, JSON responses, and standard HTTP status codes. Endpoints cover
    tasks (create, retrieve, cancel, set metadata, manage tags and unique identifiers),
    batches (create, finalize, list, prioritize, retrieve status), projects (creation
    and management), specialized annotation tasks (image and video, sensor fusion,
    LiDAR, multi-stage tasks), data retrieval and downloads, taxonomy service management,
    and callbacks for async operations. The API is versioned (v1), supports live and
    sandbox modes, and operates on one object per request (no bulk updates).
  humanURL: https://api-reference.scale.com
  baseURL: https://api.scale.com
  tags:
  - REST API
  - Labeling
  - Tasks
  - Batches
