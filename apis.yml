aid: scale-ai
name: Scale AI
description: Scale AI is the data engine for AI. The company turns raw data into training
  data by combining ML-powered pre-labeling with multi-tier human review, and ships
  an extensive REST API and SDKs for managing labeling, evaluation, and generative-AI
  data pipelines. The product portfolio spans the Scale Data Engine (foundational
  labeling and review), the GenAI Data Engine (data for foundation-model training
  and tuning), the Scale GenAI Platform (deployment and orchestration for generative
  AI), the Automotive Data Engine (LiDAR, sensor fusion, customer dashboards, Nucleus),
  and Donovan (Scale's defense / public-sector AI product). The REST API lives at
  api.scale.com/v1, supports live and sandbox modes, and is wrapped by official Python
  (scaleapi) and JavaScript (scaleapi) SDKs. The company serves enterprise, insurance,
  healthcare, and U.S. and global public-sector verticals.
